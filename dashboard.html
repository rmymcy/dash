  // Greeting
  const h = new Date().getHours();
  const greet = h<12?"Good morning":h<17?"Good afternoon":h<21?"Good evening":"Working late";
  const gc = el("div", { class:"greeting-card" });
  gc.append(el("h2", { text: greet }));
  gc.append(el("p", { text: new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}) }));
  v.append(gc);

  // Pinned links
  const bar = el("div", { class:"links-bar", style:{marginTop:"12px"} });
  for (const lk of state.links) {
    const chip = el("a", { class:"link-chip", href:lk.url, target:"_blank", rel:"noopener" });
    chip.append(document.createTextNode(lk.label));
    const del = el("button", { class:"del", html:"&#x2715;", title:"Remove", onclick: e => {
      e.preventDefault(); e.stopPropagation();
      state.links = state.links.filter(x=>x.id!==lk.id); save(); render.today();
    }});
    chip.append(del);
    bar.append(chip);
  }
  bar.append(el("button", { class:"link-add-btn", text:"+ Add link", onclick:() => {
    const lbl = el("input", { type:"text", placeholder:"Label (e.g. ADP)" });
    const url = el("input", { type:"url", placeholder:"https://…" });
    const body = el("div", { style:{display:"flex",flexDirection:"column",gap:"8px"} });
    body.append(lbl, url);
    modal("Add quick link", body, () => {
      if (!lbl.value.trim() || !url.value.trim()) return false;
      state.links.push({ id:genId("lk"), label:lbl.value.trim(), url:url.value.trim() });
      save(); render.today();
    }, { saveText:"Add" });
  }}));
  v.append(bar);

  // NWS weather alerts for all markets
  const alertStrip = el("div", { class:"alert-strip" });
  v.append(alertStrip);
  const alertCities = (state.weather?.cities||[]).filter(c => c.lat !== null && c.name);
  let alertPending = alertCities.length;
  const allAlerts = [];
  const renderAlertStrip = () => {
    alertStrip.innerHTML = "";
    allAlerts.sort((a,b) => (a.a.severity==='Extreme'?0:a.a.severity==='Severe'?1:2)-(b.a.severity==='Extreme'?0:b.a.severity==='Severe'?1:2));
    for (const {city, a} of allAlerts) {
      const isSev = a.severity==='Extreme'||a.severity==='Severe';
      const row = el("div",{class:`alert-row ${isSev?"sev":"mod"}`});
      row.append(el("span",{class:"a-badge",text:a.severity==='Extreme'?"🚨 EXTREME":a.severity==='Severe'?"⚠ SEVERE":"⚠ MODERATE"}));
      row.append(el("span",{class:"a-city",text:city.name}));
      row.append(el("span",{class:"a-event",text:a.event}));
      alertStrip.append(row);
    }
  };
  if (alertCities.length === 0) {
    alertPending = 0;
  } else {
    alertCities.forEach(city => {
      fetchAlerts(city).then(alerts => {
        for (const a of alerts) allAlerts.push({city, a});
        if (--alertPending === 0) renderAlertStrip();
      }).catch(() => { if (--alertPending === 0) renderAlertStrip(); });
    });
  }

  // Next meeting callout
  if (calCache.ts && state.calendar?.icsUrl) {
    const nowMs = Date.now();
    const todayStr = today();
    const upcoming = calCache.events.filter(e => !e.start.allDay && e.start.date === todayStr && (e.end ? e.end.ts > nowMs : e.start.ts > nowMs - 3600000));
    upcoming.sort((a,b) => a.start.ts - b.start.ts);
    const nxt = upcoming[0];
    if (nxt) {
      const diffMin = Math.round((nxt.start.ts - nowMs) / 60000);
      const isNow = diffMin <= 0 && (!nxt.end || nxt.end.ts > nowMs);
      const label = isNow ? "NOW" : diffMin < 60 ? `In ${diffMin}m` : `At ${nxt.start.timeStr}`;
      const banner = el("div", { class:"next-meeting-banner", onclick:()=>showView("schedule") });
      banner.append(el("span",{class:"nm-badge",text:label}));
      banner.append(el("span",{class:"nm-title",text:nxt.summary}));
      if (nxt.location) banner.append(el("span",{class:"nm-loc",text:"· "+nxt.location}));
      v.append(banner);
    }
  }

  // Stat strip
  const dueToday  = state.tasks.filter(t=>t.status!=="done" && t.deadline===today()).length;
  const overdueN  = state.tasks.filter(t=>t.status!=="done" && t.deadline && t.deadline<today()).length;
  const dailyItems = state.recurring?.daily||[];
  const dailyDone  = dailyItems.filter(i=>i.lastChecked===today()).length;
  const mainCity   = state.weather?.cities?.[0];

  const mkStat = (icon, val, lbl, cls, action) => {
    const b = el("div", { class:`stat-box ${cls}`, onclick: action });
    b.append(el("div",{class:"s-icon",text:icon}), el("div",{class:"s-val",text:String(val)}), el("div",{class:"s-lbl",text:lbl}));
    return b;
  };
  const strip = el("div", { class:"stat-strip" });
  strip.append(mkStat(overdueN>0?"⚠️":"✅", overdueN, "overdue", overdueN>0?"s-danger":"s-success", ()=>showView("tasks")));
  strip.append(mkStat("📋", dueToday, "due today", "s-warning", ()=>showView("tasks")));

  const wxIcon = el("div",{class:"s-icon",text:"🌡️"});
  const wxVal  = el("div",{class:"s-val",text:"—"});
  const wxStat = el("div",{class:"stat-box s-teal",onclick:()=>{}});
  wxStat.append(wxIcon, wxVal, el("div",{class:"s-lbl",text:mainCity?.name||"weather"}));
  strip.append(wxStat);
  if (mainCity?.lat!=null) {
    const fillWx = d => { wxIcon.textContent=wmoEmoji(d.current.code); wxVal.textContent=`${d.current.temp}°`; };
    const cached = wxCache[mainCity.id];
    if (cached && Date.now()-cached.ts<WX_TTL) fillWx(cached);
    else fetchCityWx(mainCity).then(fillWx).catch(()=>{});
  }

  strip.append(mkStat("✔️", `${dailyDone}/${dailyItems.length||0}`, "daily done", "s-accent", ()=>showView("tasks")));

  // Weekly progress box
  const weeklyItems = state.recurring?.weekly||[];
  const weeklyDone  = weeklyItems.filter(i=>i.lastChecked===currentWeek()).length;
  strip.append(mkStat("🗓️", `${weeklyDone}/${weeklyItems.length||0}`, "weekly done", "s-accent", ()=>showView("tasks")));

  // Monthly progress box
  const monthlyItems = state.recurring?.monthly||[];
  const monthlyDone  = monthlyItems.filter(i=>i.lastChecked===currentMonth()).length;
  strip.append(mkStat("📆", `${monthlyDone}/${monthlyItems.length||0}`, "monthly done", "s-accent", ()=>showView("tasks")));

  v.append(strip);

  // Main grid
  const grid = el("div", { class:"today-grid" });

  // Tasks — full width, overdue highlighted
  const tasksCard = el("div", { class:"card span-2" });
  tasksCard.append(el("h3",{},[el("span",{text:"Tasks"}),el("button",{class:"btn ghost sm",text:"All →",onclick:()=>showView("tasks")})]));
  const topTasks = state.tasks.filter(t=>t.status!=="done").sort((a,b)=>{
    const far = new Date(8640000000000000);
    const ad = a.deadline?new Date(a.deadline):far, bd = b.deadline?new Date(b.deadline):far;
    if (ad-bd) return ad-bd;
    return ({high:0,medium:1,low:2}[a.priority]||1)-({high:0,medium:1,low:2}[b.priority]||1);
  }).slice(0,7);
  for (const t of topTasks) {
    const diff = t.deadline ? daysBetween(today(), t.deadline) : null;
    const isOD = diff!==null && diff<0, isDT = diff===0;
    const priColor = t.priority==="high"?"var(--danger)":t.priority==="medium"?"var(--warning)":"var(--accent)";
    const r = el("div", { class:"today-task-row", style:{background:isOD?"var(--danger-soft)":isDT?"var(--warning-soft)":"transparent"} });
    r.append(el("div",{class:"today-task-bar",style:{background:priColor}}));
    r.append(el("button",{class:"btn today-check",html:"&#9711;",onclick:()=>{ t.status="done"; t.completedAt=new Date().toISOString(); save(); render.today(); renderHeader(); }}));
    r.append(el("span",{class:"today-task-title",text:t.title}));
    if (diff!==null) r.append(el("span",{class:isOD?"chip danger":isDT?"chip warning":"chip",text:isOD?`${-diff}d late`:isDT?"Today":fmtDate(t.deadline)}));
    tasksCard.append(r);
  }
  if (!topTasks.length) tasksCard.append(el("div",{class:"empty",text:"All clear ✓"}));
  grid.append(tasksCard);

  // Calendar today
  const calCard = el("div",{class:"card"});
  calCard.append(el("h3",{},[el("span",{text:"Calendar · Today"}),el("button",{class:"btn ghost sm",text:"Schedule →",onclick:()=>showView("schedule")})]));
  const calBody = el("div");
  calCard.append(calBody);
  const showTodayCal = () => {
    calBody.innerHTML="";
    renderCalEvents(calBody, calCache.events.filter(e=>e.start.date===today()),
      state.calendar?.icsUrl?"No events today":"Connect calendar in Settings");
  };
  if (calCache.ts) showTodayCal();
  else if (state.calendar?.icsUrl) {
    calBody.append(el("div",{class:"wx-loading",text:"Loading calendar…"}));
    syncCalendar().then(()=>{ calBody.innerHTML=""; showTodayCal(); }).catch(()=>{ calBody.innerHTML=""; calBody.append(el("div",{class:"wx-err",text:"Could not load"})); });
  } else {
    calBody.append(el("div",{class:"empty",text:"Connect calendar in Settings"}));
  }
  grid.append(calCard);

  // Daily checklist
  const recurCard = el("div",{class:"card"});
  recurCard.append(el("h3",{},[el("span",{text:"Daily Checklist"}),el("button",{class:"btn ghost sm",text:"All →",onclick:()=>showView("tasks")})]));
  if (dailyItems.length) {
    const pct = Math.round(dailyDone/dailyItems.length*100);
    const pw = el("div",{class:"recur-progress",style:{height:"8px",marginBottom:"10px"}});
    pw.append(el("div",{class:"fill",style:{width:`${pct}%`}}));
    recurCard.append(pw);
    recurCard.append(el("div",{class:"muted",style:{fontSize:"12px",marginBottom:"8px"},text:`${dailyDone} of ${dailyItems.length} done`}));
    for (const item of dailyItems.slice(0,8)) {
      const done = item.lastChecked===today();
      const r = el("div",{class:`recur-item${done?" done":""}`,style:{padding:"8px 0",borderBottom:"1px solid var(--border)"}});
      const cb = el("div",{class:`cb${done?" done":""}`}); if (done) cb.innerHTML="&#x2713;";
      cb.addEventListener("click",()=>{ item.lastChecked=done?null:today(); save(); render.today(); });
      r.append(cb, el("span",{class:"lbl",style:{fontSize:"15px"},text:item.title}));
      recurCard.append(r);
    }
  } else {
    recurCard.append(el("div",{class:"empty",text:"No daily tasks yet — add them in Tasks"}));
  }
  grid.append(recurCard);

  v.append(grid);

  // Crew weather — all markets
  const wxSection = el("div", { style:{marginTop:"24px"} });
  const wxHdr = el("div", { class:"flex-row", style:{justifyContent:"space-between",alignItems:"center",marginBottom:"12px"} });
  wxHdr.append(el("div", { class:"section-title", style:{margin:0}, text:"Markets" }));
  wxHdr.append(el("button", { class:"btn sm", text:"↻ Refresh", onclick:()=>{ Object.keys(wxCache).forEach(k=>delete wxCache[k]); render.today(); } }));
  wxSection.append(wxHdr);
  const wxGrid = el("div", { class:"weather-grid" });
  (state.weather?.cities||[]).forEach((city, i) => wxGrid.append(buildWxCard(city, i)));
  wxSection.append(wxGrid);
  v.append(wxSection);
};


// ============ SETTINGS ============
render.settings = () => {
  const v = $("#view-settings");
  v.innerHTML = "";
  v.append(el("h1", { text:"Settings" }));
  v.append(el("div", { class:"view-sub", text:"Calendar, appearance, and data." }));

  // --- Calendar ---
  v.append(el("div", { class:"section-title", text:"Outlook Calendar (ICS)" }));
  v.append(el("div", { class:"cal-hint", html:'Go to Outlook → Calendar → Settings → Shared calendars → Publish calendar → copy the ICS link. If your account blocks direct browser fetch, the dashboard retries via corsproxy.io (your data passes through it briefly).' }));
  const syncRow = el("div", { class:"cal-sync-row" });
  const urlInp = el("input", { type:"url", placeholder:"https://outlook.live.com/owa/calendar/…/calendar.ics", value: state.calendar?.icsUrl||"" });
  const syncStatus = el("span", { style:{fontSize:"12px"} });
  const setSyncStatus = (msg, ok) => { syncStatus.textContent = msg; syncStatus.style.color = ok ? "var(--success)" : "var(--danger)"; };
  const syncBtn = el("button", { class:"btn primary sm", text:"Sync", onclick: async () => {
    const u = urlInp.value.trim(); if (!u) return;
    state.calendar.icsUrl = u; save();
    syncBtn.textContent = "Syncing…"; syncBtn.disabled = true; syncStatus.textContent = "";
    try {
      await syncCalendar(true);
      setSyncStatus(`✓ ${calCache.events.length} events loaded`, true);
      renderPreview();
      render.today?.();
    } catch(e) {
      setSyncStatus("Failed — check the URL or connection", false);
    }
    syncBtn.textContent = "Sync"; syncBtn.disabled = false;
  }});
  const disconnectBtn = el("button", { class:"btn sm danger", text:"Disconnect", onclick:() => {
    if (!confirm("Remove calendar and clear all synced events?")) return;
    state.calendar.icsUrl = ""; save();
    calCache.events = []; calCache.ts = 0;
    urlInp.value = ""; setSyncStatus("", true);
    renderPreview(); render.today?.();
  }});
  urlInp.addEventListener("keydown", e => { if (e.key==="Enter") syncBtn.click(); });
  syncRow.append(urlInp, syncBtn, disconnectBtn, syncStatus);
  v.append(syncRow);
  const previewEl = el("div", { style:{marginTop:"6px"} });
  v.append(previewEl);
  function renderPreview() {
    previewEl.innerHTML = "";
    if (!calCache.ts) { previewEl.append(el("div",{class:"empty",text:"No calendar synced yet"})); return; }
    const now = Date.now();
    const cutoff = now + 14 * 24 * 60 * 60 * 1000;
    const todayStart = new Date(today()+'T00:00:00').getTime();
    const upcoming = calCache.events.filter(e => e.start.ts >= todayStart && e.start.ts <= cutoff);
    previewEl.append(el("div",{class:"section-title",text:`Upcoming — next 14 days (${upcoming.length})`}));
    renderCalEvents(previewEl, upcoming, "No events in the next 14 days");
    previewEl.append(el("div",{class:"wx-ts",text:`Last synced ${new Date(calCache.ts).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}`}));
  }
  if (state.calendar?.icsUrl) syncCalendar().then(renderPreview).catch(renderPreview);
  else renderPreview();

  // --- Appearance ---
  v.append(el("div", { class:"section-title", style:{marginTop:"24px"}, text:"Appearance" }));
  const themeRow = el("div", { class:"flex-row", style:{gap:"8px",marginBottom:"10px"} });
  for (const [val, label] of [["light","Light"],["dark","Dark"],["auto","System"]]) {
    themeRow.append(el("button", { class:`btn sm${state.settings.theme===val?" primary":""}`, text:label, onclick:() => {
      state.settings.theme = val; save(); applyTheme(); render.settings();
    }}));
  }
  v.append(themeRow);
  const calmRow = el("div", { class:"flex-row", style:{gap:"10px",alignItems:"center"} });
  calmRow.append(el("span", { text:"Calm mode (muted accent colors)" }));
  const calmBtn = el("button", { class:`btn sm${state.settings.calmMode?" primary":""}`, text: state.settings.calmMode?"On":"Off", onclick:() => {
    state.settings.calmMode = !state.settings.calmMode; save(); applyTheme(); render.settings();
  }});
  calmRow.append(calmBtn);
  v.append(calmRow);

  // --- Keyboard Shortcuts ---
  v.append(el("div", { class:"section-title", style:{marginTop:"24px"}, text:"Keyboard Shortcuts" }));
  const kbGrid = el("div", { style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:"6px 16px",marginBottom:"8px"} });
  const kbShortcuts = [
    ["1","Today"],["2","Tasks"],["3","Schedule"],["4","Crews"],
    ["5","Goals"],["6","Notes"],["7","Review"],["8","Settings"],
    ["Ctrl / ⌘ + K","Command palette"],["Esc","Close dialog"],
  ];
  for (const [key, label] of kbShortcuts) {
    const row = el("div", { style:{display:"flex",gap:"8px",alignItems:"center",fontSize:"13px"} });
    row.append(el("kbd", { text:key, style:{
      background:"var(--bg-2)",border:"1px solid var(--border)",borderRadius:"5px",
      padding:"2px 7px",fontFamily:"monospace",fontSize:"12px",whiteSpace:"nowrap",
      color:"var(--ink-1)",boxShadow:"0 1px 0 var(--border)"
    }}));
    row.append(el("span", { text:label, style:{color:"var(--ink-2)"} }));
    kbGrid.append(row);
  }
  v.append(kbGrid);

  // --- Cloud Sync ---
  v.append(el("div", { class:"section-title", style:{marginTop:"24px"}, text:"Cloud Sync (GitHub Gist)" }));
  v.append(el("div", { class:"cal-hint", html:'Syncs your data to a private GitHub Gist. Step 1: <a href="https://github.com/settings/tokens/new?scopes=gist&description=Dashboard+Sync" target="_blank" rel="noopener">Create a Classic token</a> with only <code>gist</code> scope. Step 2: paste it below and click Connect. Step 3: copy the Gist ID to your other devices.' }));

  const syncStatusEl = el("span", { id:"gistSyncStatus", style:{fontSize:"12px"} });
  const setSyncSt = (msg, ok) => { syncStatusEl.textContent = msg; syncStatusEl.style.color = ok?"var(--success)":"var(--danger)"; };
  if (state.sync?.lastSynced) setSyncSt(`↑ Last synced ${new Date(state.sync.lastSynced).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`, true);
  else if (state.sync?.gistId) setSyncSt("Connected", true);

  // Token row
  const tokenInp = el("input", { type:"password", placeholder:"Paste GitHub token (ghp_… or github_pat_…)", value:state.sync?.token||"", style:{flex:"1"} });
  const connectBtn = el("button", { class:"btn primary sm", text:"Connect", onclick: async () => {
    const token = tokenInp.value.trim();
    if (!token) { setSyncSt("Paste your token first", false); return; }
    connectBtn.textContent="Connecting…"; connectBtn.disabled=true; setSyncSt("Validating token…", true);
    try {
      const gistId = await connectGist(token, gistInp.value.trim()||null);
      gistInp.value = gistId;
      setSyncSt("✓ Connected and synced", true);
      render.settings(); // rebuild to show copy button + pull/disconnect
      renderAll();
    } catch(e) { setSyncSt(e.message||"Failed", false); connectBtn.textContent="Connect"; connectBtn.disabled=false; }
  }});
  const tokenRow = el("div", { class:"flex-row", style:{gap:"8px",marginBottom:"6px"} });
  tokenRow.append(tokenInp, connectBtn);
  v.append(tokenRow);

  // Gist ID row
  const gistInp = el("input", { type:"text", placeholder:"Gist ID — auto-filled after Connect (or paste from another device)", value:state.sync?.gistId||"", style:{width:"100%",fontFamily:"monospace",fontSize:"12px",marginBottom:"6px"} });
  v.append(gistInp);

  // Action row (only when connected)
  if (state.sync?.gistId) {
    const copyBtn = el("button", { class:"btn sm", text:"Copy Gist ID", onclick:() => {
      navigator.clipboard.writeText(state.sync.gistId).then(() => { copyBtn.textContent="Copied!"; setTimeout(()=>copyBtn.textContent="Copy Gist ID",1500); });
    }});
    const pullBtn = el("button", { class:"btn sm", text:"↓ Pull now", onclick: async () => {
      pullBtn.textContent="Pulling…"; pullBtn.disabled=true;
      const ok = await gistPull();
      if (ok) { setSyncSt("✓ Pulled latest data", true); renderAll(); } else setSyncSt("Pull failed — check console", false);
      pullBtn.textContent="↓ Pull now"; pullBtn.disabled=false;
    }});
    const disconnectSyncBtn = el("button", { class:"btn sm danger", text:"Disconnect", onclick:() => {
      if (!confirm("Stop syncing? Local data is kept, Gist is not deleted.")) return;
      state.sync = { token:"", gistId:"", lastSynced:null }; save(); render.settings();
    }});
    const actionRow = el("div", { class:"flex-row", style:{gap:"8px",marginBottom:"6px"} });
    actionRow.append(copyBtn, pullBtn, disconnectSyncBtn);
    v.append(actionRow);
  }

  v.append(syncStatusEl);

  // --- Data ---
  v.append(el("div", { class:"section-title", style:{marginTop:"24px"}, text:"Data" }));
  const dataRow = el("div", { class:"flex-row", style:{gap:"8px"} });
  dataRow.append(el("button", { class:"btn sm", text:"Export JSON", onclick:()=>$("#exportBtn").click() }));
  dataRow.append(el("button", { class:"btn sm", text:"Import JSON", onclick:()=>$("#importBtn").click() }));
  dataRow.append(el("button", { class:"btn sm danger", text:"Clear all data", onclick:() => {
    if (confirm("Delete everything and reset to defaults?")) { localStorage.removeItem(KEY); location.reload(); }
  }}));
  v.append(dataRow);

  // --- Weather Cities ---
  v.append(el("div", { class:"section-title", style:{marginTop:"24px"}, text:"Weather Cities" }));
  v.append(el("div", { class:"muted", style:{fontSize:"13px",marginBottom:"10px"}, text:"Set up to 7 cities for the Markets widget on Today." }));
  const wxCfgGrid = el("div", { class:"weather-grid" });
  (state.weather?.cities||[]).forEach((city, i) => wxCfgGrid.append(buildWxCard(city, i)));
  v.append(wxCfgGrid);
};

// ============ CREWS ============
render.crews = () => {
  const v = $("#view-crews");
  v.innerHTML = "";
  v.append(el("h1", { text:"Crews" }));
  v.append(el("div", { class:"view-sub", text:"One card per market. Tap a phone number to call." }));

  const addBtn = el("button", { class:"btn primary", text:"+ Add crew", onclick:() => openCrewModal(null) });
  v.append(addBtn);

  if (!state.crews.length) {
    v.append(el("div", { class:"empty", style:{marginTop:"24px"}, text:"No crews yet — add your first market above" }));
    return;
  }

  const grid = el("div", { class:"crew-grid", style:{marginTop:"16px"} });
  const STATUS_LABELS = { active:"Active", short:"Short-staffed", hold:"On hold", inactive:"Inactive" };
  for (const c of state.crews) {
    const card = el("div", { class:"crew-card" });
    const topRow = el("div", { class:"crew-market" });
    topRow.append(el("span", { text: c.market || "Unnamed market" }));
    topRow.append(el("span", { class:`crew-status ${c.status||"active"}`, text: STATUS_LABELS[c.status||"active"] }));
    card.append(topRow);
    if (c.lead) card.append(el("div", { class:"crew-detail", text:`Lead: ${c.lead}` }));
    if (c.phone) {
      const ph = el("div", { class:"crew-detail" });
      ph.append(document.createTextNode("Phone: "));
      ph.append(el("a", { href:`tel:${c.phone.replace(/\D/g,"")}`, text:c.phone, style:{color:"var(--accent)"} }));
      card.append(ph);
    }
    if (c.note) card.append(el("div", { class:"crew-note", text:c.note }));
    const actions = el("div", { class:"crew-actions" });
    actions.append(el("button", { class:"btn sm", text:"Edit", onclick:() => openCrewModal(c) }));
    actions.append(el("button", { class:"btn sm ghost", text:"Delete", onclick:() => {
      if (confirm(`Remove ${c.market}?`)) { state.crews = state.crews.filter(x=>x.id!==c.id); save(); render.crews(); }
    }}));
    card.append(actions);
    grid.append(card);
  }
  v.append(grid);

  function openCrewModal(crew) {
    const isNew = !crew;
    if (isNew) crew = { id:genId("cr"), market:"", lead:"", phone:"", status:"active", note:"" };
    const mkt  = el("input", { type:"text", placeholder:"Market / city name", value:crew.market });
    const lead = el("input", { type:"text", placeholder:"Crew lead name", value:crew.lead });
    const ph   = el("input", { type:"tel",  placeholder:"555-867-5309", value:crew.phone });
    const stat = el("select");
    for (const [val,lbl] of [["active","Active"],["short","Short-staffed"],["hold","On hold"],["inactive","Inactive"]])
      stat.append(el("option", { value:val, text:lbl, selected:crew.status===val }));
    const note = el("textarea", { placeholder:"Notes (equipment shortage, recent hire, etc.)", style:{width:"100%",minHeight:"70px"} });
    note.value = crew.note;
    const body = el("div", { class:"flex-col", style:{gap:"8px",display:"flex",flexDirection:"column"} });
    body.append(mkt, lead, ph, stat, note);
    modal(isNew ? "Add crew" : "Edit crew", body, () => {
      crew.market = mkt.value.trim();
      crew.lead   = lead.value.trim();
      crew.phone  = ph.value.trim();
      crew.status = stat.value;
      crew.note   = note.value.trim();
      if (!crew.market) return false;
      if (isNew) state.crews.push(crew);
      save(); render.crews();
    }, { saveText: isNew ? "Add" : "Save" });
  }
};

// ============ COMMAND PALETTE ============
const cmdActions = [
  { kind:"View", key:"today", label:"Today", icon:"🏠", action:()=>showView("today") },
  { kind:"View", key:"tasks", label:"Tasks", icon:"✓", action:()=>showView("tasks") },
  { kind:"View", key:"schedule", label:"Schedule / Pomodoro", icon:"📅", action:()=>showView("schedule") },
  { kind:"View", key:"goals", label:"Goals", icon:"🎯", action:()=>showView("goals") },
  { kind:"View", key:"notes", label:"Notes", icon:"📝", action:()=>showView("notes") },
  { kind:"View", key:"review", label:"Weekly Review", icon:"📊", action:()=>showView("review") },
  { kind:"View", key:"crews", label:"Crews", icon:"👥", action:()=>showView("crews") },
  { kind:"View", key:"settings", label:"Settings", icon:"⚙", action:()=>showView("settings") },
  { kind:"Action", key:"pom", label:"Start/pause Pomodoro", icon:"⏱", action:pomToggle },
  { kind:"Action", key:"theme", label:"Toggle theme", icon:"🌓", action:()=>$("#themeBtn").click() },
  { kind:"Action", key:"export", label:"Export data", icon:"⬇", action:()=>$("#exportBtn").click() },
];
function openCmd() { $("#cmd").classList.add("open"); $("#cmdInput").value=""; renderCmd(""); setTimeout(()=>$("#cmdInput").focus(),50); }
function closeCmd() { $("#cmd").classList.remove("open"); }
$("#cmdBtn").addEventListener("click", openCmd);
$("#cmd").addEventListener("click", e => { if (e.target.id==="cmd") closeCmd(); });
let cmdSel = 0;
function renderCmd(q) {
  const r = $("#cmdResults"); r.innerHTML = "";
  const ql = q.toLowerCase().trim();
  const results = [];

  // Smart commands
  if (ql.startsWith("task ")) results.push({ kind:"Quick add", label:`Add task: "${q.slice(5)}"`, icon:"+", action: () => {
    state.tasks.push({ id:genId("t"), title:q.slice(5), priority:"medium", deadline:null, status:"todo", createdAt:new Date().toISOString(), order:state.tasks.length });
    save(); render.tasks(); renderHeader(); closeCmd();
  }});
  if (ql.startsWith("note ")) results.push({ kind:"Quick add", label:`Add note`, icon:"+", action: () => {
    state.notes.push({ id:genId("n"), content:q.slice(5), createdAt:new Date().toISOString(), pinned:false, tags:[] });
    save(); render.notes(); closeCmd();
  }});

  // View matches
  for (const a of cmdActions) {
    if (!ql || a.label.toLowerCase().includes(ql) || a.key.includes(ql)) results.push(a);
  }
  cmdSel = clamp(cmdSel, 0, results.length-1);
  results.slice(0,10).forEach((res, i) => {
    const row = el("div", { class:"res"+(i===cmdSel?" sel":"") });
    row.append(el("span", { class:"icon", text: res.icon || "›" }));
    row.append(el("span", { text: res.label }));
    row.append(el("span", { class:"kind", text: res.kind }));
    row.addEventListener("click", () => { res.action(); if ($("#cmd").classList.contains("open")) closeCmd(); });
    r.append(row);
  });
}
$("#cmdInput").addEventListener("input", e => { cmdSel = 0; renderCmd(e.target.value); });
$("#cmdInput").addEventListener("keydown", e => {
  const ql = e.target.value.toLowerCase().trim();
  // Compute results count same way as renderCmd
  let n = 0;
  if (ql.startsWith("task ")) n++;
  if (ql.startsWith("note ")) n++;
  for (const a of cmdActions) if (!ql || a.label.toLowerCase().includes(ql) || a.key.includes(ql)) n++;
  if (e.key==="ArrowDown") { cmdSel = Math.min(n-1, cmdSel+1); renderCmd(e.target.value); e.preventDefault(); }
  if (e.key==="ArrowUp") { cmdSel = Math.max(0, cmdSel-1); renderCmd(e.target.value); e.preventDefault(); }
  if (e.key==="Enter") { const rows = $$("#cmdResults .res"); if (rows[cmdSel]) rows[cmdSel].click(); }
  if (e.key==="Escape") closeCmd();
});
document.addEventListener("keydown", e => {
  if ((e.metaKey||e.ctrlKey) && e.key==="k") { e.preventDefault(); openCmd(); }
  if (e.key==="Escape") closeCmd();
  if (!$("#modal").classList.contains("open") && !$("#cmd").classList.contains("open") && document.activeElement.tagName!=="INPUT" && document.activeElement.tagName!=="TEXTAREA") {
    const map = { "1":"today","2":"tasks","3":"schedule","4":"crews","5":"goals","6":"notes","7":"review","8":"settings" };
    if (map[e.key]) { showView(map[e.key]); }
  }
});

// ============ EXPORT / IMPORT ============
$("#exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state,null,2)], { type:"application/json" });
  const a = el("a", { href: URL.createObjectURL(blob), download: `dashboard-${today()}.json` });
  document.body.appendChild(a); a.click(); a.remove();
});
$("#importBtn").addEventListener("click", () => $("#importFile").click());
$("#importFile").addEventListener("change", e => {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try { const d = JSON.parse(ev.target.result); if (d.version) { state = Object.assign(defaultState(), d); save(); renderAll(); alert("Imported."); } }
    catch(err) { alert("Invalid file."); }
  };
  r.readAsText(file); e.target.value = "";
});

// ============ INIT ============
function renderAll() {
  renderHeader();
  for (const k of Object.keys(render)) {
    try { render[k]?.(); } catch(e) { console.error("render." + k + " failed:", e); }
  }
}
if (state.sync?.token && state.sync?.gistId) {
  gistPull().then(() => { renderAll(); showView(localStorage.getItem("_view") || "today"); });
} else {
  renderAll();
  showView(localStorage.getItem("_view") || "today");
}
</script>
