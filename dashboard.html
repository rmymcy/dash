<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3b6df0">
<title>Dashboard</title>
<style>
:root {
  --bg: #f7f7f3; --surface: #fff; --surface-2: #fafaf6; --ink: #1a1a1a; --ink-2: #444;
  --muted: #6b6b6b; --border: #e4e4dd;
  --accent: #3b6df0; --accent-soft: #e8edfb;
  --success: #2f7a4a; --success-soft: #e6f1ea;
  --warning: #d97706; --warning-soft: #fef3e2;
  --danger: #d03030; --danger-soft: #fce8e8;
  --purple: #8b5cf6; --purple-soft: #f0ebfd;
  --teal: #0d9488; --teal-soft: #e0f5f3;
  --shadow: 0 1px 3px rgba(0,0,0,.05), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 6px 20px rgba(0,0,0,.08);
  --radius: 10px; --radius-sm: 6px;
  --tap: 44px;
}
:root.dark {
  --bg:#15151a;--surface:#1f1f24;--surface-2:#26262d;--ink:#e8e8e4;--ink-2:#bbb;--muted:#888;
  --border:#33333a;--accent:#6b8ff8;--accent-soft:#243056;
  --success:#4caf6a;--success-soft:#1d3527;--warning:#f5a838;--warning-soft:#3a2e16;
  --danger:#e85555;--danger-soft:#3b2020;--purple:#a78bfa;--purple-soft:#2a2244;
  --teal:#2dd4bf;--teal-soft:#173834;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow-lg:0 6px 20px rgba(0,0,0,.4);
}
@media(prefers-color-scheme:dark){:root.auto{
  --bg:#15151a;--surface:#1f1f24;--surface-2:#26262d;--ink:#e8e8e4;--ink-2:#bbb;--muted:#888;
  --border:#33333a;--accent:#6b8ff8;--accent-soft:#243056;
  --success:#4caf6a;--success-soft:#1d3527;--warning:#f5a838;--warning-soft:#3a2e16;
  --danger:#e85555;--danger-soft:#3b2020;--purple:#a78bfa;--purple-soft:#2a2244;
  --teal:#2dd4bf;--teal-soft:#173834;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow-lg:0 6px 20px rgba(0,0,0,.4);
}}
:root.calm { --bg:#fafaf7; --accent:#0d9488; --accent-soft:#e0f5f3; }

* { box-sizing: border-box; margin:0; padding:0 }
html,body { background:var(--bg); color:var(--ink);
  font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; min-height:100dvh }
body { display:flex; flex-direction:column }
button,input,textarea,select { font:inherit; color:inherit }
button { cursor:pointer; touch-action:manipulation; background:none; border:none }
input,textarea,select { background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:9px 12px; min-height:var(--tap); color:var(--ink) }
input:focus,textarea:focus,select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft) }
::placeholder { color:var(--muted) }
h1,h2,h3,h4 { font-weight:600; line-height:1.3 }
a { color:var(--accent); text-decoration:none }

/* Header */
header { background:var(--surface); border-bottom:1px solid var(--border);
  padding:10px 18px; display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:30; flex-shrink:0 }
header .brand { font-weight:700; font-size:15px; display:flex; align-items:center; gap:6px }
header .brand .logo { width:24px; height:24px; background:var(--accent); border-radius:6px;
  display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; font-weight:700 }
header .greeting { color:var(--muted); font-size:13px }
header .spacer { flex:1 }
header .h-stat { display:flex; align-items:center; gap:4px; padding:3px 10px;
  background:var(--surface-2); border-radius:99px; font-size:12px; color:var(--ink-2); white-space:nowrap }
header .h-stat strong { color:var(--ink); font-weight:600 }
header .h-stat.streak { background:var(--success-soft); color:var(--success) }
header button.icon { padding:8px; border-radius:8px; min-width:38px; min-height:38px;
  display:flex; align-items:center; justify-content:center; color:var(--ink-2) }
header button.icon:hover { background:var(--accent-soft); color:var(--accent) }
header button.icon svg { width:18px; height:18px }
@media(max-width:899px) {
  header { padding:8px 12px; gap:8px }
  header .greeting,header .h-stat:not(.streak) { display:none }
}

/* App */
#app { flex:1; display:flex; overflow:hidden }
#sidebar { width:200px; background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:10px; overflow-y:auto; flex-shrink:0 }
#sidebar .nav-btn { display:flex; align-items:center; gap:10px; padding:10px 12px;
  border-radius:var(--radius-sm); color:var(--ink-2); font-size:14px; font-weight:500;
  text-align:left; width:100%; transition:.15s }
#sidebar .nav-btn:hover { background:var(--surface-2) }
#sidebar .nav-btn.active { background:var(--accent-soft); color:var(--accent) }
#sidebar .nav-btn svg { width:18px; height:18px; flex-shrink:0 }
#sidebar .nav-btn .badge { margin-left:auto; background:var(--danger); color:#fff;
  border-radius:99px; font-size:10px; padding:1px 6px; font-weight:600 }
#sidebar .group-label { font-size:10px; text-transform:uppercase; letter-spacing:.6px;
  color:var(--muted); padding:14px 12px 4px; font-weight:600 }
#sidebar .group-label:first-child { padding-top:4px }

#content { flex:1; display:flex; flex-direction:column; overflow:hidden }
.view { flex:1; overflow-y:auto; padding:20px 24px; display:none }
.view.active { display:block; animation:fade .15s }
@keyframes fade { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
.view h1 { font-size:22px; margin-bottom:4px }
.view .view-sub { color:var(--muted); margin-bottom:18px; font-size:13px }

/* Mobile tabs */
#mtabs { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--surface);
  border-top:1px solid var(--border); z-index:25; padding:4px 0 env(safe-area-inset-bottom,4px);
  overflow-x:auto; white-space:nowrap; box-shadow:var(--shadow-lg) }
#mtabs .tabs { display:flex; min-width:max-content; padding:0 4px }
#mtabs button { display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:6px 14px; font-size:10px; color:var(--muted); min-width:62px; min-height:48px; flex-shrink:0 }
#mtabs button.active { color:var(--accent) }
#mtabs button svg { width:20px; height:20px }

@media(max-width:899px) {
  #sidebar { display:none }
  #mtabs { display:block }
  body { padding-bottom:64px }
  .view { padding:14px 14px 8px }
}

/* Generic cards */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px; box-shadow:var(--shadow) }
.card h3 { font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;
  font-weight:600; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center }
.empty { text-align:center; padding:24px; color:var(--muted); font-size:13px }
.row { display:flex; align-items:center; gap:8px }
.row.between { justify-content:space-between }

/* Today view */
.today-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:14px }
.today-grid .span-2 { grid-column:span 2 }
@media(max-width:700px){ .today-grid .span-2 { grid-column:span 1 }}
.stat-big { font-size:28px; font-weight:700; line-height:1.1 }
.stat-sub { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; font-weight:600 }
.stat-row { display:flex; align-items:baseline; gap:8px }
.stat-row .delta { font-size:12px; color:var(--success); font-weight:500 }
.stat-row .delta.bad { color:var(--danger) }
.greeting-card { background:linear-gradient(135deg,var(--accent),var(--purple));
  color:#fff; padding:18px; border-radius:var(--radius); border:none }
.greeting-card h2 { font-size:18px; margin-bottom:4px; color:#fff }
.greeting-card p { opacity:.85; font-size:13px }

/* Buttons */
.btn { padding:9px 16px; border-radius:var(--radius-sm); font-weight:500; font-size:13px;
  min-height:var(--tap); display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border);
  background:var(--surface); color:var(--ink); transition:.15s }
.btn:hover { background:var(--surface-2) }
.btn.primary { background:var(--accent); color:#fff; border-color:var(--accent) }
.btn.primary:hover { background:var(--accent); filter:brightness(1.05) }
.btn.danger { background:var(--danger); color:#fff; border-color:var(--danger) }
.btn.ghost { background:none; border:none; color:var(--muted); padding:6px 10px; min-height:32px }
.btn.ghost:hover { color:var(--accent); background:var(--accent-soft) }
.btn.sm { padding:5px 10px; font-size:12px; min-height:30px }
.btn.icon-only { padding:8px; min-width:34px; min-height:34px }

.chip { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:99px;
  font-size:11px; background:var(--surface-2); color:var(--ink-2); font-weight:500; border:1px solid var(--border) }
.chip.success { background:var(--success-soft); color:var(--success); border-color:var(--success-soft) }
.chip.warning { background:var(--warning-soft); color:var(--warning); border-color:var(--warning-soft) }
.chip.danger { background:var(--danger-soft); color:var(--danger); border-color:var(--danger-soft) }
.chip.accent { background:var(--accent-soft); color:var(--accent); border-color:var(--accent-soft) }
.chip.purple { background:var(--purple-soft); color:var(--purple); border-color:var(--purple-soft) }

/* Kanban */
.kanban { display:grid; grid-template-columns:repeat(3,1fr); gap:12px }
@media(max-width:760px){.kanban{grid-template-columns:1fr}}
.kanban-col { background:var(--surface-2); border-radius:var(--radius); padding:10px; min-height:140px }
.kanban-col h3 { font-size:11px; text-transform:uppercase; letter-spacing:.6px;
  color:var(--muted); margin-bottom:8px; display:flex; justify-content:space-between; font-weight:600 }
.kanban-col .count { background:var(--border); color:var(--muted); font-size:10px; padding:1px 6px; border-radius:99px }
.task-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:10px; margin-bottom:6px; box-shadow:var(--shadow); cursor:grab; transition:.15s }
.task-card:hover { border-color:var(--accent) }
.task-card.dragging { opacity:.4 }
.task-card .title { font-weight:500; font-size:14px; word-break:break-word; line-height:1.4 }
.task-card .meta { display:flex; gap:6px; align-items:center; margin-top:6px; flex-wrap:wrap }
.task-card .priority { width:8px; height:8px; border-radius:50%; flex-shrink:0 }
.task-card .priority.high { background:var(--danger) }
.task-card .priority.medium { background:var(--warning) }
.task-card .priority.low { background:var(--accent) }
.task-card .actions { margin-left:auto; display:flex; gap:2px }
.task-card .actions button { padding:4px 6px; color:var(--muted); border-radius:4px; min-width:28px; min-height:28px;
  display:inline-flex; align-items:center; justify-content:center; font-size:13px }
.task-card .actions button:hover { background:var(--accent-soft); color:var(--accent) }
.drop-zone { border:2px dashed var(--accent); background:var(--accent-soft);
  border-radius:var(--radius-sm); min-height:40px; margin-bottom:6px; display:none }
.kanban-col.drag-over .drop-zone { display:block }

/* Recurring tasks */
.recur-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:20px }
@media(max-width:760px) { .recur-grid { grid-template-columns:1fr } }
.recur-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px }
.recur-card h3 { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); font-weight:600; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center }
.recur-progress { height:4px; background:var(--border); border-radius:2px; margin-bottom:10px; overflow:hidden }
.recur-progress .fill { height:100%; background:var(--success); border-radius:2px; transition:.3s }
.recur-item { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--border) }
.recur-item:last-child { border-bottom:none }
.recur-item .cb { width:20px; height:20px; border-radius:4px; border:2px solid var(--border); cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:.1s; font-size:11px }
.recur-item .cb.done { background:var(--success); border-color:var(--success); color:#fff }
.recur-item .lbl { flex:1; font-size:14px }
.recur-item.done .lbl { text-decoration:line-through; color:var(--muted) }
.recur-item .del { color:var(--muted); opacity:.35; padding:2px 5px; font-size:12px; border-radius:3px }
.recur-item .del:hover { opacity:1; color:var(--danger); background:var(--danger-soft) }
.recur-add { display:flex; gap:6px; margin-top:10px }
.recur-add input { flex:1; padding:7px 10px; font-size:13px; min-height:32px }
.recur-add button { font-size:13px; min-height:32px }

/* Schedule */
.week-grid { display:grid; grid-template-columns:60px repeat(7,1fr); gap:0; background:var(--border) }
.week-grid > div { background:var(--surface); padding:6px 4px; font-size:11px }
.week-grid .hd { background:var(--surface-2); font-weight:600; text-align:center; color:var(--ink-2) }
.week-grid .hd.today { color:var(--accent) }
.week-grid .hr { font-size:10px; color:var(--muted); text-align:right; padding-right:6px; min-height:40px }
.week-grid .cell { min-height:40px; position:relative; cursor:pointer }
.week-grid .cell:hover { background:var(--accent-soft) }
.week-block { position:absolute; left:2px; right:2px; padding:3px 5px;
  background:var(--accent); color:#fff; font-size:10px; border-radius:3px; overflow:hidden; cursor:pointer }
@media(max-width:760px){ .week-grid { grid-template-columns:40px repeat(7,1fr); font-size:10px }
  .week-grid .hr { font-size:9px } }

/* Pomodoro */
.pomodoro-card { text-align:center; padding:18px }
.pom-timer { font-size:58px; font-weight:200; font-variant-numeric:tabular-nums; margin:10px 0; letter-spacing:-2px }
.pom-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; font-weight:600 }
.pom-ring { width:160px; height:160px; margin:0 auto 10px; position:relative }
.pom-ring svg { transform:rotate(-90deg); width:100%; height:100% }
.pom-ring circle { fill:none; stroke-width:8 }
.pom-ring .bg { stroke:var(--border) }
.pom-ring .fg { stroke:var(--accent); stroke-linecap:round; transition:stroke-dashoffset .3s }
.pom-ring .display { position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center }
.pom-ring .display .t { font-size:30px; font-weight:300; font-variant-numeric:tabular-nums }
.pom-ring .display .l { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px }
.pom-controls { display:flex; gap:8px; justify-content:center; margin-top:10px }

/* Goals */
.goal-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px; margin-bottom:10px }
.goal-card .top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; gap:8px }
.goal-card .title { font-weight:600; font-size:15px; flex:1 }
.goal-card .pct { font-size:13px; color:var(--accent); font-weight:600; white-space:nowrap }
.goal-bar { height:8px; background:var(--surface-2); border-radius:4px; overflow:hidden; margin-bottom:8px }
.goal-bar .fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--purple)); border-radius:4px; transition:.3s }
.goal-card .milestones { font-size:12px; color:var(--muted) }
.goal-card .ms { display:flex; align-items:center; gap:6px; padding:4px 0 }
.goal-card .ms .check { width:16px; height:16px; border-radius:3px; border:1.5px solid var(--border);
  cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center }
.goal-card .ms .check.done { background:var(--success); border-color:var(--success); color:#fff; font-size:10px }
.goal-card .ms.done { text-decoration:line-through; opacity:.6 }
.goal-card .controls { display:flex; gap:4px; align-items:center; font-size:12px; color:var(--muted); margin-top:6px }

/* Notes */
.note-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px; margin-bottom:8px; box-shadow:var(--shadow) }
.note-card.pinned { border-left:3px solid var(--warning) }
.note-card .content { font-size:14px; white-space:pre-wrap; word-break:break-word; line-height:1.55 }
.note-card .bottom { display:flex; justify-content:space-between; align-items:center; margin-top:8px;
  font-size:11px; color:var(--muted) }
.note-card .bottom button { padding:3px 6px; color:var(--muted); font-size:13px; border-radius:4px }
.note-card .bottom button:hover { color:var(--accent); background:var(--accent-soft) }
.note-card .tags { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap }



/* Weather */
.weather-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px }
.wx-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px }
.wx-card.wx-main { border-color:var(--accent); border-left-width:3px }
.wx-label { font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:var(--accent); font-weight:700; margin-bottom:6px }
.wx-location { font-size:11px; color:var(--muted); margin:-6px 0 8px; letter-spacing:.2px }
.wx-city-row { display:flex; gap:6px; align-items:center; margin-bottom:10px }
.wx-city-row input { flex:1; font-size:14px; font-weight:600; padding:6px 10px; min-height:34px }
.wx-city-row button { min-height:34px; font-size:12px }
.wx-current { display:flex; align-items:center; gap:14px; margin:10px 0 }
.wx-emoji { font-size:44px; line-height:1; flex-shrink:0 }
.wx-temp { font-size:40px; font-weight:200; font-variant-numeric:tabular-nums; line-height:1 }
.wx-cond { font-size:13px; font-weight:600; color:var(--ink); margin-top:2px }
.wx-details { font-size:11px; color:var(--muted); margin-top:2px }
.wx-week { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border) }
.wx-day { text-align:center }
.wx-day .wd { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.3px; font-weight:600 }
.wx-day .we { font-size:20px; margin:4px 0 2px }
.wx-day .wh { font-size:12px; font-weight:700 }
.wx-day .wl { font-size:11px; color:var(--muted) }
.wx-loading { color:var(--muted); font-size:13px; padding:18px 0; text-align:center }
.wx-err { color:var(--danger); font-size:12px; margin:4px 0 }
.wx-ts { font-size:10px; color:var(--muted); margin-top:10px; text-align:right }

/* Modals */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:50;
  display:none; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(2px) }
.modal-overlay.open { display:flex }
.modal { background:var(--surface); border-radius:14px; padding:22px; width:100%; max-width:440px;
  box-shadow:var(--shadow-lg); max-height:90vh; overflow-y:auto }
.modal h2 { font-size:17px; margin-bottom:12px }
.modal label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; margin-top:12px; font-weight:500 }
.modal .btns { display:flex; gap:8px; justify-content:flex-end; margin-top:18px }

/* Command palette */
#cmd { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:60;
  align-items:flex-start; justify-content:center; padding:80px 16px 16px; backdrop-filter:blur(4px) }
#cmd.open { display:flex }
#cmd .panel { background:var(--surface); border-radius:12px; width:100%; max-width:520px;
  box-shadow:var(--shadow-lg); overflow:hidden }
#cmd input { width:100%; border:none; border-bottom:1px solid var(--border); border-radius:0;
  padding:14px 16px; font-size:16px; background:transparent }
#cmd input:focus { box-shadow:none; outline:none }
#cmd .results { max-height:300px; overflow-y:auto }
#cmd .res { padding:10px 16px; cursor:pointer; display:flex; align-items:center; gap:10px; font-size:13px }
#cmd .res .icon { color:var(--muted); width:18px; flex-shrink:0 }
#cmd .res .kind { margin-left:auto; color:var(--muted); font-size:11px }
#cmd .res:hover,#cmd .res.sel { background:var(--accent-soft) }

/* Helpers */
.flex-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap }
.muted { color:var(--muted) }
.section-title { font-size:13px; font-weight:600; color:var(--ink-2); margin:16px 0 8px; display:flex;
  justify-content:space-between; align-items:center }
.section-title:first-child { margin-top:0 }
.divider { height:1px; background:var(--border); margin:16px 0 }
.scroll-x { display:flex; overflow-x:auto; gap:10px; padding-bottom:6px; scrollbar-width:thin }
.no-scrollbar::-webkit-scrollbar { display:none }
</style>
</head>
<body>

<header>
  <div class="brand"><div class="logo">D</div></div>
  <span class="greeting" id="greeting"></span>
  <span class="spacer"></span>
  <span class="h-stat" id="stat-tasks"><span>Tasks today: <strong id="hsTasks">0</strong></span></span>

<script>
"use strict";
const KEY = "dashboard_v2";
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const el = (t,p={},k=[]) => {
  const e = document.createElement(t);
  for (const [a,v] of Object.entries(p)) {
    if (a==="class") e.className = v;
    else if (a==="html") e.innerHTML = v;
    else if (a==="text") e.textContent = v;
    else if (a.startsWith("on") && typeof v==="function") e.addEventListener(a.slice(2),v);
    else if (a==="style" && typeof v==="object") Object.assign(e.style, v);
    else if (v!==null && v!==undefined) e.setAttribute(a,v);
  }
  for (const c of (Array.isArray(k)?k:[k])) if (c) e.append(c);
  return e;
};
const genId = p => p+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7);
const today = () => new Date().toISOString().slice(0,10);
const dayStr = d => d.toISOString().slice(0,10);
const fmtDate = d => { if(!d) return ""; const dt = new Date(d+"T00:00:00"); return dt.toLocaleDateString("en-US",{month:"short",day:"numeric"}); };
const fmtDateTime = iso => new Date(iso).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
const daysBetween = (a,b) => Math.round((new Date(b)-new Date(a))/864e5);
const esc = s => { const d = document.createElement("div"); d.textContent = s||""; return d.innerHTML; };
const clamp = (v,a,b) => Math.max(a, Math.min(b,v));
const sum = arr => arr.reduce((a,b)=>a+(+b||0),0);
const currentWeek = () => { const d = new Date(), day = d.getDay(), m = new Date(d); m.setDate(d.getDate()-(day===0?6:day-1)); return dayStr(m); };
const currentMonth = () => today().slice(0,7);

// ============ WEATHER HELPERS ============
const wxCache = {};
const WX_TTL = 30 * 60 * 1000;
function wmoEmoji(c) {
  if (c===0) return "☀️"; if (c<=2) return "🌤️"; if (c===3) return "☁️";
  if (c<=48) return "🌫️"; if (c<=55) return "🌦️"; if (c<=65) return "🌧️";
  if (c<=77) return "❄️"; if (c<=82) return "🌧️"; if (c<=86) return "🌨️";
  return "⛈️";
}
function wmoLabel(c) {
  if (c===0) return "Clear"; if (c===1) return "Mainly clear"; if (c===2) return "Partly cloudy";
  if (c===3) return "Overcast"; if (c<=48) return "Foggy"; if (c<=55) return "Drizzle";
  if (c<=65) return "Rain"; if (c<=77) return "Snow"; if (c<=82) return "Showers";
  if (c<=86) return "Snow showers"; return "Thunderstorm";
}
async function geocodeCity(name) {
  const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=en&format=json`);
  const d = await r.json();
  if (!d.results?.length) throw new Error("not found");
  const res = d.results[0];
  return { lat: res.latitude, lng: res.longitude, region: res.admin1 || "", country: res.country_code || "" };
}
async function fetchCityWx(city) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lng}&current=temperature_2m,weathercode,windspeed_10m&daily=weathercode,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=auto&forecast_days=7`;
  const r = await fetch(url);
  const d = await r.json();
  const entry = {
    ts: Date.now(),
    current: { temp: Math.round(d.current.temperature_2m), code: d.current.weathercode, wind: Math.round(d.current.windspeed_10m) },
    daily: d.daily.time.map((dt, i) => ({ date: dt, code: d.daily.weathercode[i], hi: Math.round(d.daily.temperature_2m_max[i]), lo: Math.round(d.daily.temperature_2m_min[i]) }))
  };
  wxCache[city.id] = entry;
  return entry;
}
function showWxData(container, data, compact=false) {
  const { current, daily } = data;
  const d0 = daily[0];
  const curr = el("div", { class:"wx-current" });
  curr.append(el("div", { class:"wx-emoji", text: wmoEmoji(current.code) }));
  const inf = el("div");
  inf.append(el("div", { class:"wx-temp", text:`${current.temp}°F` }));
  inf.append(el("div", { class:"wx-cond", text: wmoLabel(current.code) }));
  inf.append(el("div", { class:"wx-details", text:`↑${d0?.hi}° ↓${d0?.lo}° · Wind ${current.wind} mph` }));
  curr.append(inf);
  container.append(curr);
  if (!compact) {
    const week = el("div", { class:"wx-week" });
    const DN = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    for (const d of daily) {
      const dt = new Date(d.date+"T12:00:00");
      const dc = el("div", { class:"wx-day" });
      dc.append(el("div",{class:"wd",text:d.date===today()?"Today":DN[dt.getDay()]}));
      dc.append(el("div",{class:"we",text:wmoEmoji(d.code)}));
      dc.append(el("div",{class:"wh",text:`${d.hi}°`}));
      dc.append(el("div",{class:"wl",text:`${d.lo}°`}));
      week.append(dc);
    }
    container.append(week);
  }
  container.append(el("div",{class:"wx-ts",text:`Updated ${new Date(data.ts).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}`}));
}
function buildWxCard(city, idx) {
  const card = el("div", { class:`wx-card${idx===0?" wx-main":""}` });
  const errEl = el("div", { class:"wx-err" });
  const cityRow = el("div", { class:"wx-city-row" });
  const inp = el("input", { type:"text", placeholder:`City ${idx+1}…`, value: city.name||"" });
  const setBtn = el("button", { class:"btn sm primary", text:"Set", onclick: async () => {
    const name = inp.value.trim(); if (!name) return;
    setBtn.textContent = "…"; setBtn.disabled = true; errEl.textContent = "";
    try {
      const { lat, lng, region, country } = await geocodeCity(name);
      city.name = name; city.lat = lat; city.lng = lng; city.region = region; city.country = country;
      delete wxCache[city.id]; save();
      const newCard = buildWxCard(city, idx); card.replaceWith(newCard);
    } catch(e) {
      errEl.textContent = "City not found — check spelling"; setBtn.textContent = "Set"; setBtn.disabled = false;
    }
  }});
  inp.addEventListener("keydown", e => { if (e.key==="Enter") setBtn.click(); });
  cityRow.append(inp, setBtn); card.append(cityRow, errEl);
  if (city.name && city.lat !== null) {
    const parts = [city.region, city.country].filter(Boolean).join(", ");
    if (parts) card.append(el("div", { class:"wx-location", text: parts }));
  }
  if (!city.name || city.lat===null) { card.append(el("div",{class:"wx-loading",text:"Enter a city name above"})); return card; }
  const wxArea = el("div");
  card.append(wxArea);
  const cached = wxCache[city.id];
  if (cached && Date.now()-cached.ts < WX_TTL) {
    showWxData(wxArea, cached);
  } else {
    wxArea.append(el("div",{class:"wx-loading",text:"Loading weather…"}));
    fetchCityWx(city).then(data => { wxArea.innerHTML=""; showWxData(wxArea, data); }).catch(() => { wxArea.innerHTML=""; wxArea.append(el("div",{class:"wx-err",text:"Failed to load — check connection"})); });
  }
  return card;
}
function defaultState() {
  return {
    version: 2,
    tasks: [],
    schedule: { blocks: [], pomodoro: { work:25, brk:5, longBrk:15, sessions:4 } },
    goals: [],
    notes: [],
    recurring: { daily: [], weekly: [], monthly: [] },
    weather: { cities: [
      { id:"w0", name:"Orlando", lat:28.5383, lng:-81.3792, region:"Florida", country:"US" },
      { id:"w1", name:"", lat:null, lng:null, region:"", country:"" },
      { id:"w2", name:"", lat:null, lng:null, region:"", country:"" },
      { id:"w3", name:"", lat:null, lng:null, region:"", country:"" },
      { id:"w4", name:"", lat:null, lng:null, region:"", country:"" },
      { id:"w5", name:"", lat:null, lng:null, region:"", country:"" },
      { id:"w6", name:"", lat:null, lng:null, region:"", country:"" },
    ]},
    review: { entries: [] },
    settings: { theme: "auto", calmMode: false }
  };
}
function normalizeState(s) {
  const d = defaultState();
  if (!s.schedule) s.schedule = d.schedule;
  if (!s.schedule.pomodoro) s.schedule.pomodoro = d.schedule.pomodoro;
  if (!s.recurring) s.recurring = d.recurring;
  if (!s.recurring.daily) s.recurring.daily = [];
  if (!s.recurring.weekly) s.recurring.weekly = [];
  if (!s.recurring.monthly) s.recurring.monthly = [];
  if (!s.weather) s.weather = d.weather;
  if (!s.weather.cities) s.weather.cities = d.weather.cities;
  for (const c of s.weather.cities) {
    if (c.region === undefined) c.region = "";
    if (c.country === undefined) c.country = "";
  }
  if (!s.settings) s.settings = d.settings;
  if (s.settings.theme === undefined) s.settings.theme = "auto";
  if (s.settings.calmMode === undefined) s.settings.calmMode = false;
  if (!s.goals) s.goals = [];
  if (!s.notes) s.notes = [];
  if (!s.tasks) s.tasks = [];
  if (!s.review) s.review = d.review;
  return s;
}
function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) return normalizeState(Object.assign(defaultState(), JSON.parse(raw)));
    // migrate v1
    const v1 = localStorage.getItem("dashboard_v1");
    if (v1) {
      const d = JSON.parse(v1);
      const s = defaultState();
      s.tasks = d.tasks || [];
      s.schedule = d.schedule || s.schedule;
      s.goals = d.goals || [];
      s.notes = d.notes || [];
      return normalizeState(s);
    }
  } catch(e) { console.error(e); }
  return defaultState();
}
function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) { console.error(e); } }
let state = load();


// ============ THEME ============
function applyTheme() {
  const t = state.settings.theme;
  document.documentElement.className = t + (state.settings.calmMode ? " calm" : "");
  $("#themeBtn").innerHTML = t==="dark" ? "&#x2600;" : t==="light" ? "&#x263E;" : "&#x25D1;";
  $("#themeBtn").title = `Theme: ${t}`;
}
$("#themeBtn").addEventListener("click", () => {
  const cycle = { auto:"dark", dark:"light", light:"auto" };
  state.settings.theme = cycle[state.settings.theme] || "auto";
  save(); applyTheme();
});
applyTheme();

// ============ HEADER ============
function renderHeader() {
  const h = new Date().getHours();
  const greet = h<12 ? "Good morning" : h<17 ? "Good afternoon" : h<21 ? "Good evening" : "Working late";
  const d = new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  $("#greeting").textContent = `${greet} — ${d}`;
  const todoToday = state.tasks.filter(t => t.status!=="done" && (!t.deadline || t.deadline<=today())).length;
  $("#hsTasks").textContent = todoToday;
  const taskBadge = state.tasks.filter(t => t.status!=="done" && t.deadline && t.deadline<today()).length;
  if (taskBadge > 0) { $("#navBadgeTasks").style.display=""; $("#navBadgeTasks").textContent = taskBadge; }
  else $("#navBadgeTasks").style.display = "none";
}

// ============ NAV ============
function showView(name) {
  for (const v of $$(".view")) v.classList.toggle("active", v.id === "view-"+name);
  for (const b of $$("#sidebar .nav-btn,#mtabs button")) b.classList.toggle("active", b.dataset.view===name);
  render[name]?.();
}
for (const b of $$("#sidebar .nav-btn, #mtabs button")) {
  b.addEventListener("click", () => showView(b.dataset.view));
}

// ============ MODAL ============
function modal(title, body, onSave, opts={}) {
  const content = $("#modalContent");
  content.innerHTML = "";
  content.append(el("h2", { text: title }));
  if (typeof body === "string") content.append(el("div", { html: body }));
  else content.append(body);
  const btns = el("div", { class: "btns" });
  btns.append(el("button", { class: "btn", text: "Cancel", onclick: closeModal }));
  if (onSave) btns.append(el("button", { class: "btn primary", text: opts.saveText || "Save", onclick: () => { if (onSave()!==false) closeModal(); } }));
  content.append(btns);
  $("#modal").classList.add("open");
  setTimeout(() => content.querySelector("input,textarea,select")?.focus(), 50);
}
function closeModal() { $("#modal").classList.remove("open"); }
$("#modal").addEventListener("click", e => { if (e.target.id==="modal") closeModal(); });

// ============ TASKS ============
const render = {};
render.weather = () => {
  const v = $("#view-weather");
  v.innerHTML = "";
  v.append(el("h1",{text:"Weather"}));
  v.append(el("div",{class:"view-sub",text:"Live conditions + 7-day forecast for all crew markets. Click Set to save a city."}));
  const hdr = el("div",{class:"flex-row",style:{justifyContent:"flex-end",marginBottom:"14px"}});
  hdr.append(el("button",{class:"btn sm",text:"↻ Refresh all",onclick:()=>{ Object.keys(wxCache).forEach(k=>delete wxCache[k]); render.weather(); }}));
  v.append(hdr);
  if (!state.weather) state.weather = defaultState().weather;
  const grid = el("div",{class:"weather-grid"});
  state.weather.cities.forEach((city, i) => grid.append(buildWxCard(city, i)));
  v.append(grid);
};
render.tasks = () => {
  const v = $("#view-tasks");
  v.innerHTML = "";
  v.append(el("h1", { text: "Tasks" }));
  v.append(el("div", { class: "view-sub", text: "Drag between columns. Click + to add." }));

  const addBar = el("div", { class: "flex-row", style: { marginBottom: "16px" } });
  const input = el("input", { type:"text", placeholder:"Add a task and press Enter…", style:{flex:"1",minWidth:"200px"} });
  const prio = el("select"); for (const [v,l] of [["medium","Medium"],["high","High"],["low","Low"]]) prio.append(el("option",{value:v,text:l}));
  const dl = el("input", { type:"date" });
  const btn = el("button", { class:"btn primary", text:"Add", onclick:add });
  function add() {
    if (!input.value.trim()) return;
    state.tasks.push({ id:genId("t"), title:input.value.trim(), priority:prio.value, deadline:dl.value||null, status:"todo", createdAt:new Date().toISOString(), order:state.tasks.length });
    input.value=""; dl.value="";
    save(); render.tasks(); renderHeader();
  }
  input.addEventListener("keydown", e => { if (e.key==="Enter") add(); });
  addBar.append(input, prio, dl, btn);
  v.append(addBar);

  const kanban = el("div", { class: "kanban" });
  for (const [status, label] of [["todo","To Do"],["doing","In Progress"],["done","Done"]]) {
    const col = el("div", { class: "kanban-col", "data-status": status });
    const tasks = state.tasks.filter(t => t.status === status);
    const head = el("h3"); head.append(el("span",{text:label}), el("span",{class:"count",text:tasks.length}));
    col.append(head);
    col.append(el("div", { class: "drop-zone" }));
    const cards = el("div");
    for (const t of tasks.sort((a,b)=>(a.order||0)-(b.order||0))) {
      const card = el("div", { class:"task-card", draggable:"true", "data-id":t.id });
      card.addEventListener("dragstart", e => { e.dataTransfer.setData("text/plain", t.id); card.classList.add("dragging"); });
      card.addEventListener("dragend", () => card.classList.remove("dragging"));
      card.append(el("div", { class:"title", text:t.title }));
      const meta = el("div", { class:"meta" });
      meta.append(el("span", { class:`priority ${t.priority}` }));
      if (t.deadline) {
        const diff = daysBetween(today(), t.deadline);
        const cls = diff<0 ? "chip danger" : diff===0 ? "chip warning" : diff<=2 ? "chip warning" : "chip";
        meta.append(el("span", { class: cls, text: diff<0 ? `${-diff}d overdue` : diff===0 ? "Today" : fmtDate(t.deadline) }));
      }
      const actions = el("span", { class:"actions" });
      if (status !== "done") actions.append(el("button", { html:"&#x2714;", title:"Complete", onclick:() => { t.status="done"; t.completedAt=new Date().toISOString(); save(); render.tasks(); renderHeader(); }}));
      if (status === "todo") actions.append(el("button", { html:"&#x25B6;", title:"Start", onclick:() => { t.status="doing"; save(); render.tasks(); }}));
      actions.append(el("button", { html:"&#x2715;", title:"Delete", onclick:() => { state.tasks = state.tasks.filter(x=>x.id!==t.id); save(); render.tasks(); renderHeader(); }}));
      meta.append(actions);
      card.append(meta);
      cards.append(card);
    }
    if (!tasks.length) cards.append(el("div", { class:"empty", text:"Empty" }));
    col.append(cards);
    col.addEventListener("dragover", e => { e.preventDefault(); col.classList.add("drag-over"); });
    col.addEventListener("dragleave", () => col.classList.remove("drag-over"));
    col.addEventListener("drop", e => {
      e.preventDefault(); col.classList.remove("drag-over");
      const id = e.dataTransfer.getData("text/plain");
      const task = state.tasks.find(t => t.id === id);
      if (task) { task.status = col.dataset.status; if (task.status==="done" && !task.completedAt) task.completedAt = new Date().toISOString(); save(); render.tasks(); renderHeader(); }
    });
    kanban.append(col);
  }
  v.append(kanban);

  v.append(el("div", { class:"section-title", style:{marginTop:"24px"}, text:"Recurring" }));
  renderRecurring(v);
};

function renderRecurring(container) {
  const sections = [
    { key:"daily",   label:"Daily",   period:today(),        hint:"Resets each day" },
    { key:"weekly",  label:"Weekly",  period:currentWeek(),  hint:"Resets each Monday" },
    { key:"monthly", label:"Monthly", period:currentMonth(), hint:"Resets each month" },
  ];
  const grid = el("div", { class:"recur-grid" });
  for (const { key, label, period, hint } of sections) {
    if (!state.recurring[key]) state.recurring[key] = [];
    const items = state.recurring[key];
    const doneCount = items.filter(i => i.lastChecked === period).length;
    const total = items.length;
    const card = el("div", { class:"recur-card" });
    const head = el("h3");
    head.append(el("span", { text: label }));
    head.append(el("span", { class: doneCount===total&&total>0?"chip success":"chip", text:`${doneCount}/${total}` }));
    card.append(head);
    const prog = el("div", { class:"recur-progress" });
    prog.append(el("div", { class:"fill", style:{width: total ? `${Math.round(doneCount/total*100)}%`:"0%"} }));
    card.append(prog);
    const list = el("div");
    for (const item of items) {
      const done = item.lastChecked === period;
      const row = el("div", { class:`recur-item${done?" done":""}` });
      const cb = el("div", { class:`cb${done?" done":""}` });
      if (done) cb.innerHTML = "&#x2713;";
      cb.addEventListener("click", () => { item.lastChecked = done ? null : period; save(); render.tasks(); });
      row.append(cb, el("span", { class:"lbl", text:item.title }));
      row.append(el("button", { class:"del", html:"&#x2715;", onclick:() => { state.recurring[key]=state.recurring[key].filter(x=>x.id!==item.id); save(); render.tasks(); }}));
      list.append(row);
    }
    if (!items.length) list.append(el("div", { class:"empty", style:{padding:"8px 0",fontSize:"13px"}, text:`No ${label.toLowerCase()} tasks yet` }));
    card.append(list);
    const addRow = el("div", { class:"recur-add" });
    const inp = el("input", { type:"text", placeholder:`Add ${label.toLowerCase()} task…` });
    const addBtn = el("button", { class:"btn primary sm", text:"Add", onclick:() => {
      if (!inp.value.trim()) return;
      state.recurring[key].push({ id:genId("rc"), title:inp.value.trim(), lastChecked:null });
      inp.value=""; save(); render.tasks();
    }});
    inp.addEventListener("keydown", e => { if (e.key==="Enter") addBtn.click(); });
    addRow.append(inp, addBtn);
    card.append(addRow);
    grid.append(card);
  }
  container.append(grid);
}

// ============ SCHEDULE ============
let pomState = { running:false, remaining:0, mode:"work", session:1, interval:null, start:0, base:0 };
function pomInit() { pomState.remaining = (state.schedule?.pomodoro?.work||25)*60; }
function pomNext() {
  const p = state.schedule.pomodoro;
  if (pomState.mode === "work") {
    pomState.mode = pomState.session >= (p.sessions||4) ? "longbreak" : "break";
  } else {
    pomState.mode = "work";
    if (pomState.session >= (p.sessions||4)) pomState.session = 1;
    else pomState.session++;
  }
  pomState.remaining = (pomState.mode==="work" ? (p.work||25) : pomState.mode==="break" ? (p.brk||5) : (p.longBrk||15))*60;
}
function pomBeep() { try {
  const ctx = new AudioContext();
  for (let i=0;i<3;i++) {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 660 + i*220;
    g.gain.setValueAtTime(0.2, ctx.currentTime + i*0.18);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.18 + 0.15);
    o.start(ctx.currentTime + i*0.18); o.stop(ctx.currentTime + i*0.18 + 0.2);
  }
} catch(e) {} }
function pomToggle() {
  if (pomState.running) { clearInterval(pomState.interval); pomState.running = false; }
  else {
    pomState.start = Date.now(); pomState.base = pomState.remaining;
    pomState.interval = setInterval(() => {
      pomState.remaining = Math.max(0, pomState.base - Math.round((Date.now()-pomState.start)/1000));
      renderPomDisplay();
      if (pomState.remaining <= 0) { clearInterval(pomState.interval); pomState.running = false; pomBeep(); pomNext(); renderPomDisplay(); }
    }, 250);
    pomState.running = true;
  }
  renderPomDisplay();
}
function pomReset() { clearInterval(pomState.interval); pomState.running=false; pomState.mode="work"; pomState.session=1; pomInit(); renderPomDisplay(); }
function renderPomDisplay() {
  for (const r of $$(".pom-ring")) {
    const total = (pomState.mode==="work" ? (state.schedule.pomodoro.work||25) : pomState.mode==="break" ? (state.schedule.pomodoro.brk||5) : (state.schedule.pomodoro.longBrk||15)) * 60;
    const pct = 1 - pomState.remaining/total;
    const circ = 2 * Math.PI * 60;
    const fg = r.querySelector(".fg");
    if (fg) { fg.setAttribute("stroke-dasharray", circ); fg.setAttribute("stroke-dashoffset", circ * (1 - pct)); }
    const m = Math.floor(pomState.remaining/60), s = pomState.remaining%60;
    const t = r.querySelector(".t"); if (t) t.textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    const l = r.querySelector(".l"); if (l) l.textContent = pomState.mode==="work" ? `Focus · ${pomState.session}/${state.schedule.pomodoro.sessions||4}` : pomState.mode==="break" ? "Short break" : "Long break";
  }
  for (const b of $$(".pom-toggle")) b.textContent = pomState.running ? "Pause" : "Start";
}
function pomRing() {
  const wrap = el("div", { class: "pom-ring" });
  wrap.innerHTML = `<svg viewBox="0 0 140 140"><circle class="bg" cx="70" cy="70" r="60"/><circle class="fg" cx="70" cy="70" r="60"/></svg><div class="display"><div class="t">25:00</div><div class="l">Focus</div></div>`;
  return wrap;
}
pomInit();

  const recurCard = el("div", { class:"card" });
  const dailyItems = state.recurring?.daily || [];
  const dailyDone = dailyItems.filter(i => i.lastChecked === today()).length;
  recurCard.append(el("h3", {}, [el("span",{text:"Daily Tasks"}), el("button",{class:"btn ghost sm",text:"All →",onclick:()=>showView("tasks")})]));
  if (dailyItems.length) {
    const prog = el("div", { class:"recur-progress" });
    prog.append(el("div", { class:"fill", style:{width:`${Math.round(dailyDone/dailyItems.length*100)}%`} }));
    recurCard.append(prog);
    for (const item of dailyItems.slice(0,6)) {
      const done = item.lastChecked === today();
      const r = el("div", { class:`recur-item${done?" done":""}`, style:{borderBottom:"1px solid var(--border)",padding:"6px 0"} });
      const cb = el("div", { class:`cb${done?" done":""}` });
      if (done) cb.innerHTML = "&#x2713;";
      cb.addEventListener("click", () => { item.lastChecked = done ? null : today(); save(); render.today(); });
      r.append(cb, el("span", { class:"lbl", text:item.title }));
      recurCard.append(r);
    }
    recurCard.append(el("div", { class:"muted", style:{fontSize:"11px",marginTop:"8px"}, text:`${dailyDone}/${dailyItems.length} done today` }));
  } else {
    recurCard.append(el("div", { class:"empty", text:"No daily tasks yet" }));
  }
  grid.append(recurCard);

  v.append(grid);
};


// ============ COMMAND PALETTE ============
const cmdActions = [
  { kind:"View", key:"today", label:"Today", icon:"🏠", action:()=>showView("today") },
  { kind:"View", key:"tasks", label:"Tasks", icon:"✓", action:()=>showView("tasks") },
  { kind:"View", key:"schedule", label:"Schedule / Pomodoro", icon:"📅", action:()=>showView("schedule") },
  { kind:"View", key:"weather", label:"Weather — crew markets", icon:"⛅", action:()=>showView("weather") },
  { kind:"View", key:"goals", label:"Goals", icon:"🎯", action:()=>showView("goals") },
  { kind:"View", key:"notes", label:"Notes", icon:"📝", action:()=>showView("notes") },
  { kind:"View", key:"review", label:"Weekly Review", icon:"📊", action:()=>showView("review") },
  { kind:"Action", key:"pom", label:"Start/pause Pomodoro", icon:"⏱", action:pomToggle },
  { kind:"Action", key:"theme", label:"Toggle theme", icon:"🌓", action:()=>$("#themeBtn").click() },
  { kind:"Action", key:"export", label:"Export data", icon:"⬇", action:()=>$("#exportBtn").click() },
];
function openCmd() { $("#cmd").classList.add("open"); $("#cmdInput").value=""; renderCmd(""); setTimeout(()=>$("#cmdInput").focus(),50); }
function closeCmd() { $("#cmd").classList.remove("open"); }
$("#cmdBtn").addEventListener("click", openCmd);
$("#cmd").addEventListener("click", e => { if (e.target.id==="cmd") closeCmd(); });
let cmdSel = 0;
function renderCmd(q) {
  const r = $("#cmdResults"); r.innerHTML = "";
  const ql = q.toLowerCase().trim();
  const results = [];

  // Smart commands
  if (ql.startsWith("task ")) results.push({ kind:"Quick add", label:`Add task: "${q.slice(5)}"`, icon:"+", action: () => {
    state.tasks.push({ id:genId("t"), title:q.slice(5), priority:"medium", deadline:null, status:"todo", createdAt:new Date().toISOString(), order:state.tasks.length });
    save(); render.tasks(); renderHeader(); closeCmd();
  }});
  if (ql.startsWith("note ")) results.push({ kind:"Quick add", label:`Add note`, icon:"+", action: () => {
    state.notes.push({ id:genId("n"), content:q.slice(5), createdAt:new Date().toISOString(), pinned:false, tags:[] });
    save(); render.notes(); closeCmd();
  }});

  // View matches
  for (const a of cmdActions) {
    if (!ql || a.label.toLowerCase().includes(ql) || a.key.includes(ql)) results.push(a);
  }
  cmdSel = clamp(cmdSel, 0, results.length-1);
  results.slice(0,10).forEach((res, i) => {
    const row = el("div", { class:"res"+(i===cmdSel?" sel":"") });
    row.append(el("span", { class:"icon", text: res.icon || "›" }));
    row.append(el("span", { text: res.label }));
    row.append(el("span", { class:"kind", text: res.kind }));
    row.addEventListener("click", () => { res.action(); if ($("#cmd").classList.contains("open")) closeCmd(); });
    r.append(row);
  });
}
$("#cmdInput").addEventListener("input", e => { cmdSel = 0; renderCmd(e.target.value); });
$("#cmdInput").addEventListener("keydown", e => {
  const ql = e.target.value.toLowerCase().trim();
  // Compute results count same way as renderCmd
  let n = 0;
  if (ql.startsWith("task ")) n++;
  if (ql.startsWith("note ")) n++;
  for (const a of cmdActions) if (!ql || a.label.toLowerCase().includes(ql) || a.key.includes(ql)) n++;
  if (e.key==="ArrowDown") { cmdSel = Math.min(n-1, cmdSel+1); renderCmd(e.target.value); e.preventDefault(); }
  if (e.key==="ArrowUp") { cmdSel = Math.max(0, cmdSel-1); renderCmd(e.target.value); e.preventDefault(); }
  if (e.key==="Enter") { const rows = $$("#cmdResults .res"); if (rows[cmdSel]) rows[cmdSel].click(); }
  if (e.key==="Escape") closeCmd();
});
document.addEventListener("keydown", e => {
  if ((e.metaKey||e.ctrlKey) && e.key==="k") { e.preventDefault(); openCmd(); }
  if (e.key==="Escape") closeCmd();
  if (!$("#modal").classList.contains("open") && !$("#cmd").classList.contains("open") && document.activeElement.tagName!=="INPUT" && document.activeElement.tagName!=="TEXTAREA") {
    const map = { "1":"today","2":"tasks","3":"schedule","4":"weather","5":"goals","6":"notes","7":"review" };
    if (map[e.key]) { showView(map[e.key]); }
  }
});

// ============ EXPORT / IMPORT ============
$("#exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state,null,2)], { type:"application/json" });
  const a = el("a", { href: URL.createObjectURL(blob), download: `dashboard-${today()}.json` });
  document.body.appendChild(a); a.click(); a.remove();
});
$("#importBtn").addEventListener("click", () => $("#importFile").click());
$("#importFile").addEventListener("change", e => {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try { const d = JSON.parse(ev.target.result); if (d.version) { state = Object.assign(defaultState(), d); save(); renderAll(); alert("Imported."); } }
    catch(err) { alert("Invalid file."); }
  };
  r.readAsText(file); e.target.value = "";
});

// ============ INIT ============
function renderAll() {
  renderHeader();
  for (const k of Object.keys(render)) {
    try { render[k]?.(); } catch(e) { console.error("render." + k + " failed:", e); }
  }
}
renderAll();
showView("today");
</script>
